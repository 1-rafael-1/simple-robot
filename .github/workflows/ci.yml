name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install latest nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Run clippy (default features)
        run: cargo clippy --target thumbv8m.main-none-eabihf -- -D warnings --no-deps

      - name: Build
        run: cargo build --release --verbose --target thumbv8m.main-none-eabihf
